{% extends "base.html" %}

{% block title %} Forms Data - Upload File {% endblock %}

{% block content%}
<h2>Learnign POST and FORMs Data</h2>
<form action="{{ url_for('home') }}" method="POST">
    <label for="Demo Data">Demo Data:</label> <br>
    <input type="text" name="name" id="" placeholder="Your Full Name">Name <br>
    <input type="number" name="age" id="" placeholder="34">Age <br>
    <input type="email" name="email" id="" placeholder="abc@example.com">Email Address <br>
    <input type="hidden" name="hidden_data" value="This data is hidden"> <br>
    <input type="submit" value="Submit"> <br>
    <input type="reset" value="Reset"> <br>
</form>

<h2>Upload File</h2>
<form action="{{ url_for('upload_file') }}" method="post" enctype="multipart/form-data">
<input type="file" name="file_name" id="" accept="application/pdf, application/msword, application.excel" required> <br>
<input type="submit" value="Upload File">
</form>

<h2>Upload File to the folder</h2>
<form action="{{ url_for('upload_file') }}" method="post" enctype="multipart/form-data">
<input type="file" name="file_name" id="" accept="application/pdf, application/msword, application.excel" required> <br>
<input type="submit" value="Upload File">
</form>
{% endblock %}
