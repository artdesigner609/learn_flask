{% extends "base.html" %}

{% block title %} Forms Data - Upload File {% endblock %}

{% block content%}
<h2>Learnign POST and FORMs Data</h2>

<h2>Upload File to the folder</h2>
<form action="{{ url_for('upload_file') }}" method="post" enctype="multipart/form-data">
<input type="file" name="file_name" id="" accept="application/pdf, application/msword, application.excel" required> <br>
<input type="submit" value="Upload File">
</form>

{% endblock %}
